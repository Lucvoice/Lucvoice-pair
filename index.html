<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUCVOICE-XMD | PRO TECH DASHBOARD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --neon-primary: #00ff9d;
      --neon-secondary: #0080ff;
      --neon-accent: #ff00ff;
      --cyber-blue: #00f7ff;
      --dark-surface: rgba(16, 18, 27, 0.85);
      --text-primary: #ffffff;
      --text-secondary: #a0a0c0;
      --grid-color: rgba(0, 247, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #050510, #0a0a1a, #070714);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    .cyber-grid {
      position: fixed;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }

    .dashboard {
      position: relative;
      z-index: 10;
      max-width: 480px;
      margin: 5% auto;
      padding: 35px;
      background: var(--dark-surface);
      border-radius: 20px;
      border: 1px solid rgba(0,255,157,0.2);
      backdrop-filter: blur(20px);
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: auto;
      border-radius: 50%;
      background: url('https://files.catbox.moe/rdvo5l.png') center/cover no-repeat;
      box-shadow: 0 0 30px rgba(0,255,157,0.4);
    }

    h1 {
      margin-top: 20px;
      font-size: 2.5rem;
      background: linear-gradient(90deg,#00ff9d,#00f7ff,#ff00ff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .btn {
      padding: 18px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: rgba(20,22,35,0.7);
      border: 1px solid rgba(0,255,157,0.2);
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(0,255,157,0.3);
    }

    .btn i {
      font-size: 20px;
      margin-bottom: 5px;
      display: block;
    }

    .status {
      margin-top: 25px;
      padding: 10px;
      background: rgba(10,12,20,0.8);
      border-radius: 10px;
      font-size: 14px;
    }

    footer {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    @media(max-width:500px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<div class="cyber-grid"></div>

<div class="dashboard">

  <div class="logo"></div>

  <h1>LUCVOICE-XMD</h1>
  <div class="subtitle">TECH DASHBOARD</div>

  <div class="grid">

    <a href="/qr" class="btn">
      <i class="fas fa-qrcode"></i>
      QR CODE
    </a>

    <a href="/pair" class="btn">
      <i class="fas fa-link"></i>
      PAIR CODE
    </a>

    <a href="https://whatsapp.com/channel/0029VbBG4gfISTkCpKxyMH02" class="btn">
      <i class="fab fa-whatsapp"></i>
      WHATSAPP
    </a>

    <a href="https://github.com/Sila-Md/SILA-MD" class="btn">
      <i class="fab fa-github"></i>
      GITHUB
    </a>

  </div>

  <div class="status">
    ● System Online | v3.1.0 | 24/7 Active
  </div>

  <footer>
    © <span id="year"></span> LUCVOICE-XMD TECH
  </footer>

</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
