<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD | Connect</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
radial-gradient(circle at top left,#00f0ff55,transparent 30%),
radial-gradient(circle at bottom right,#ff00ea44,transparent 30%),
radial-gradient(circle at center,#8a2eff33,transparent 40%),
linear-gradient(135deg,#03040c,#09122a,#101a38,#060710);
overflow:hidden;
}

/* floating blur balls */
body::before,
body::after{
content:"";
position:absolute;
width:240px;
height:240px;
border-radius:50%;
filter:blur(70px);
opacity:.65;
animation:move 8s infinite alternate ease-in-out;
}

body::before{
background:#00ffee;
top:-70px;
left:-70px;
}

body::after{
background:#ff00dd;
bottom:-70px;
right:-70px;
animation-delay:2s;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(35px,35px);}
}

.container{
width:100%;
max-width:530px;
padding:32px;
border-radius:32px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.16);
box-shadow:
0 25px 70px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.20);
text-align:center;
color:#fff;
position:relative;
z-index:2;
}

/* logo */
.logo{
width:110px;
height:110px;
margin:auto;
border-radius:30px;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
background:rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.20);
backdrop-filter:blur(20px);
box-shadow:0 10px 30px rgba(0,255,255,.20);
margin-bottom:18px;
animation:float 2.8s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

h1{
font-size:2rem;
font-weight:900;
letter-spacing:1px;
margin-bottom:8px;
}

h1 span{
background:linear-gradient(90deg,#00ffee,#ffffff,#ff55ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
font-size:.96rem;
color:#e6e6e6;
margin-bottom:28px;
}

/* cards */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
text-decoration:none;
color:#fff;
padding:24px 16px;
border-radius:24px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.13);
backdrop-filter:blur(20px);
transition:.30s;
box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
}

.card:hover{
transform:translateY(-6px) scale(1.02);
background:rgba(255,255,255,.13);
}

.card i{
font-size:44px;
margin-bottom:14px;
display:block;
}

.card h2{
font-size:1.08rem;
font-weight:800;
margin-bottom:8px;
}

.card p{
font-size:.84rem;
color:#e0e0e0;
}

.pair i{
color:#00ff99;
}

.qr i{
color:#00d9ff;
}

/* footer */
.footer{
margin-top:24px;
padding-top:18px;
border-top:1px solid rgba(255,255,255,.10);
font-size:.86rem;
color:#ddd;
line-height:1.8;
}

.footer span{
color:#00ffee;
font-weight:700;
}

.copy{
color:#ff77ff;
font-weight:700;
}

/* mobile */
@media(max-width:540px){
.container{
padding:24px;
}
.grid{
grid-template-columns:1fr;
}
h1{
font-size:1.7rem;
}
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<i class="fas fa-robot"></i>
</div>

<h1><span>LUCVOICE-XMD</span></h1>
<p class="sub">Premium WhatsApp Pairing Portal</p>

<div class="grid">

<a href="/pair" class="card pair" target="_blank">
<i class="fas fa-link"></i>
<h2>Pairing Code</h2>
<p>Generate secure connection code instantly</p>
</a>

<a href="/qr" class="card qr" target="_blank">
<i class="fas fa-qrcode"></i>
<h2>QR Code</h2>
<p>Scan and connect your WhatsApp fast</p>
</a>

</div>

<div class="footer">
Powered By <span>LUCVOICE-XMD</span><br>
<span class="copy">Copyright © 2026</span>
</div>

</div>

</body>
</html>
