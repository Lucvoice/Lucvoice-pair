<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LUCVOICE-XMD | Pairing</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#050816,#0d1b2a,#1b263b,#415a77);
overflow:hidden;
}

.container{
width:100%;
max-width:480px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.1);
border-radius:28px;
padding:30px;
box-shadow:0 25px 60px rgba(0,0,0,.45);
text-align:center;
color:#fff;
}

.logo{
width:95px;
height:95px;
margin:auto;
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
background:linear-gradient(135deg,#00f5ff,#00ff88);
color:#000;
box-shadow:0 0 25px rgba(0,255,200,.45);
margin-bottom:18px;
}

h1{
font-size:2rem;
font-weight:900;
letter-spacing:1px;
margin-bottom:8px;
}

.sub{
color:#d9d9d9;
font-size:.95rem;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:10px;
}

.card{
background:rgba(255,255,255,.06);
padding:22px 15px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
cursor:pointer;
transition:.25s;
text-decoration:none;
color:#fff;
}

.card:hover{
transform:translateY(-5px);
background:rgba(255,255,255,.12);
}

.card i{
font-size:38px;
margin-bottom:12px;
display:block;
}

.card h2{
font-size:1.05rem;
margin-bottom:6px;
}

.card p{
font-size:.82rem;
color:#d9d9d9;
}

.pair i{
color:#00ff88;
}

.qr i{
color:#00d9ff;
}

.footer{
margin-top:25px;
padding-top:18px;
border-top:1px solid rgba(255,255,255,.08);
font-size:.85rem;
color:#ddd;
}

.footer span{
color:#00ffcc;
font-weight:bold;
}

@media(max-width:500px){
.grid{
grid-template-columns:1fr;
}
h1{
font-size:1.7rem;
}
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<i class="fas fa-robot"></i>
</div>

<h1>LUCVOICE-XMD</h1>
<p class="sub">Fast WhatsApp Connection System</p>

<div class="grid">

<a href="/pair" target="_blank" class="card pair">
<i class="fas fa-link"></i>
<h2>Pairing Code</h2>
<p>Connect using 8 digit code</p>
</a>

<a href="/qr" target="_blank" class="card qr">
<i class="fas fa-qrcode"></i>
<h2>QR Code</h2>
<p>Scan QR to connect instantly</p>
</a>

</div>

<div class="footer">
Powered By <span>LUCVOICE-XMD</span>
</div>

</div>

</body>
</html>
