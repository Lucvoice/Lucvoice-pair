<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Poppins", sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0f2027,#203a43,#000);
  overflow:hidden;
}

/* animated background glow */
body::before{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  background: #00ffe0;
  filter: blur(150px);
  opacity:0.15;
  top:10%;
  left:20%;
  animation: move 6s infinite alternate;
}

@keyframes move{
  from{ transform: translate(0,0);}
  to{ transform: translate(100px,80px);}
}

/* glass card */
.card{
  width:340px;
  height:220px;
  border-radius:25px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#00ffe0;
  text-align:center;
  transition: transform 0.2s ease;
  position:relative;
}

/* glow ring */
.card::before{
  content:"";
  position:absolute;
  width:120%;
  height:120%;
  border-radius:30px;
  background: radial-gradient(circle, rgba(0,255,224,0.25), transparent 70%);
  z-index:-1;
  filter: blur(20px);
}

h1{
  font-size:26px;
  letter-spacing:3px;
  animation: glow 2s infinite alternate;
}

p{
  font-size:14px;
  margin-top:10px;
  color:#ffffffaa;
}

@keyframes glow{
  from{text-shadow:0 0 5px #00ffe0;}
  to{text-shadow:0 0 20px #00ffe0,0 0 40px #00ffe0;}
}

/* copyright */
footer{
  position:absolute;
  bottom:15px;
  font-size:12px;
  color:#ffffff80;
}

/* small floating effect */
@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0px);}
}

.card{
  animation: float 4s ease-in-out infinite;
}
</style>
</head>

<body>

<div class="card" id="card">
  <h1>LUCVOICE-XMD</h1>
  <p>Glassmorphism AI Interface</p>
</div>

<footer>© 2026 LUCVOICE-XMD | All Rights Reserved</footer>

<script>
const card = document.getElementById("card");

// 3D bend effect
document.addEventListener("mousemove",(e)=>{
  let x = (window.innerWidth/2 - e.clientX)/25;
  let y = (window.innerHeight/2 - e.clientY)/25;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

// reset
document.addEventListener("mouseleave",()=>{
  card.style.transform = "rotateY(0deg) rotateX(0deg)";
});

// touch support
document.addEventListener("touchmove",(e)=>{
  let t = e.touches[0];
  let x = (window.innerWidth/2 - t.clientX)/25;
  let y = (window.innerHeight/2 - t.clientY)/25;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
