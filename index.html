<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LUCVOICE-XMD</title><!-- QR CODE LIB --><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #0f0c29, #302b63, #24243e);
  color:#fff;
}

.container{
  width:340px;
  padding:20px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 40px rgba(0,255,225,0.2);
  text-align:center;
}

.logo{
  font-size:40px;
  margin-bottom:10px;
}

h1{
  font-size:24px;
  letter-spacing:2px;
  color:#00ffe1;
}

.pair-box{
  margin-top:15px;
  padding:10px;
  background: rgba(0,0,0,0.3);
  border-radius:12px;
}

.code{
  font-size:22px;
  font-weight:bold;
  letter-spacing:3px;
  color:#ffd700;
}

button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background: linear-gradient(45deg,#00ffe1,#00aaff);
  color:#000;
  font-weight:bold;
}

#qrcode{
  margin-top:15px;
  display:flex;
  justify-content:center;
}

.footer{
  margin-top:15px;
  font-size:12px;
  opacity:0.7;
}

</style></head>
<body><div class="container">  <div class="logo">🪀</div>
  <h1>LUCVOICE-XMD</h1>
  <p>AI Pairing System</p>  <div class="pair-box">
    <p>Your Pairing Code:</p>
    <div class="code" id="code">LOADING...</div>
    <button onclick="generateCode()">Generate Code</button>
  </div>  <div id="qrcode"></div>  <div class="footer">© 2026 LUCVOICE-XMD SYSTEM</div>
</div><script>
function generateCode(){
  let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code = "";

  for(let i=0;i<8;i++){
    code += chars.charAt(Math.floor(Math.random()*chars.length));
  }

  document.getElementById("code").innerText = code;

  // QR code
  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), {
    text: "LUCVOICE-XMD-PAIR:" + code,
    width: 180,
    height: 180,
    colorDark: "#00ffe1",
    colorLight: "#ffffff"
  });
}

// auto generate on load
generateCode();
</script></body>
</html>
