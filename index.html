<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD AI | Smart Connect</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
radial-gradient(circle at top,#00ffee33,transparent 40%),
radial-gradient(circle at bottom,#8a2eff33,transparent 40%),
linear-gradient(135deg,#04050f,#0a1230,#0d1b3a);
overflow:hidden;
}

/* glow */
body::before,
body::after{
content:"";
position:absolute;
width:260px;
height:260px;
border-radius:50%;
filter:blur(90px);
opacity:.6;
animation:move 6s infinite alternate;
}

body::before{
background:#00ffee;
top:-80px;
left:-80px;
}

body::after{
background:#ff00ff;
bottom:-80px;
right:-80px;
animation-delay:2s;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(40px,40px);}
}

.card{
width:100%;
max-width:520px;
padding:32px;
border-radius:32px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(28px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 30px 80px rgba(0,0,0,0.55);
text-align:center;
color:#fff;
position:relative;
}

.ai{
display:inline-block;
padding:6px 14px;
border-radius:50px;
background:rgba(0,255,255,0.15);
border:1px solid rgba(0,255,255,0.3);
font-size:.8rem;
margin-bottom:12px;
color:#00ffee;
}

.logo{
width:110px;
height:110px;
margin:auto;
border-radius:28px;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
background:linear-gradient(135deg,#00ffee,#7b2cff);
box-shadow:0 0 30px rgba(0,255,255,.3);
margin-bottom:15px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

h1{
font-size:2rem;
font-weight:900;
}

h1 span{
background:linear-gradient(90deg,#00ffee,#fff,#ff66ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
margin-top:8px;
font-size:.95rem;
color:#ddd;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.btn{
padding:16px;
border-radius:18px;
text-decoration:none;
color:#fff;
font-weight:800;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
transition:.25s;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
}

.btn i{
font-size:30px;
}

.btn:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.16);
}

.pair i{color:#00ff99;}
.qr i{color:#00d9ff;}

.footer{
margin-top:22px;
padding-top:15px;
border-top:1px solid rgba(255,255,255,0.1);
font-size:.85rem;
color:#ccc;
}

.footer span{
color:#00ffee;
font-weight:700;
}

@media(max-width:520px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="card">

<div class="ai">AI SYSTEM ACTIVE</div>

<div class="logo">
<i class="fas fa-brain"></i>
</div>

<h1><span>LUCVOICE-XMD</span></h1>
<p class="sub">Smart AI WhatsApp Connection System</p>

<div class="grid">

<a href="/pair" class="btn pair">
<i class="fas fa-link"></i>
Pairing Code
</a>

<a href="/qr" class="btn qr">
<i class="fas fa-qrcode"></i>
QR Code
</a>

</div>

<div class="footer">
Powered by <span>LUCVOICE-XMD AI</span> © 2026
</div>

</div>

</body>
</html>
