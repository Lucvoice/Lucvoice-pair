<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEBASTIAN MD | PAIRING SITE</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    /* Main Container */
    .container {
      max-width: 500px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 30px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    /* Logo */
    .logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid white;
    }

    .logo i {
      font-size: 50px;
      color: white;
    }

    /* Title */
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 25px;
    }

    /* Stats */
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 15px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
    }

    /* Button Grid */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 25px 0;
    }

    .btn {
      padding: 12px 15px;
      border: none;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: white;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn i {
      font-size: 1.1rem;
    }

    /* Button Colors */
    .btn.group { background: #25D366; }
    .btn.pair { background: #FF6B6B; }
    .btn.github { background: #333; }
    .btn.contact { background: #0077B5; }
    .btn.channel { background: #FF69B4; }
    .btn.render { background: #46E3B7; color: #333; }

    /* Wide Button */
    .btn-wide {
      grid-column: span 2;
    }

    /* Footer */
    .footer {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 0.8rem;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .container {
        padding: 25px 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .button-grid {
        grid-template-columns: 1fr;
      }

      .btn-wide {
        grid-column: span 1;
      }

      .stats {
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- Main Container -->
  <div class="container">
    
    <!-- Logo -->
    <div class="logo">
      <i class="fas fa-robot"></i>
    </div>

    <!-- Title -->
    <h1>SEBASTIAN MD</h1>
    <div class="subtitle">
      WhatsApp Bot • Pairing System
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-item">
        <div class="stat-number">1500+</div>
        <div class="stat-label">Users</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">350+</div>
        <div class="stat-label">Groups</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">150+</div>
        <div class="stat-label">Commands</div>
      </div>
    </div>

    <!-- Button Grid -->
    <div class="button-grid">
      
      <button onclick="window.open('https://chat.whatsapp.com/DTnrZzULVtP5r0E9rhoFOj', '_blank')" class="btn group">
        <i class="fab fa-whatsapp"></i> WA Group
      </button>

      <button onclick="window.open('/pair', '_blank')" class="btn pair">
        <i class="fas fa-link"></i> Pair Code
      </button>

      <button onclick="window.open('https://github.com/bravesebastian458-dotcom/Sebastian-Md', '_blank')" class="btn github">
        <i class="fab fa-github"></i> GitHub
      </button>

      <button onclick="window.open('https://wa.me/255612619717', '_blank')" class="btn contact">
        <i class="fas fa-headset"></i> Contact
      </button>

      <button onclick="window.open('https://whatsapp.com/channel/0029VatokI45EjxufALmY32X', '_blank')" class="btn channel">
        <i class="fas fa-tv"></i> Channel 1
      </button>

      <button onclick="window.open('https://whatsapp.com/channel/0029Vb7LxhRGE56l9woRjd2g', '_blank')" class="btn channel">
        <i class="fas fa-tv"></i> Channel 2
      </button>

      <!-- Render Deploy Button -->
      <button onclick="window.open('https://render.com/deploy?repo=https://github.com/bravesebastian458-dotcom/Sebastian-Md', '_blank')" class="btn render btn-wide">
        <i class="fas fa-cloud-upload-alt"></i> Deploy on Render
      </button>

    </div>

    <!-- Footer -->
    <div class="footer">
      <a onclick="copyToClipboard('https://sebastian-md.onrender.com')">
        <i class="fas fa-copy"></i> Copy URL
      </a>
      <a onclick="window.location.reload()">
        <i class="fas fa-sync-alt"></i> Refresh
      </a>
    </div>

  </div>

  <script>
    // Copy to clipboard function
    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert('URL copied to clipboard! ✅');
      } catch (err) {
        alert('Failed to copy ❌');
      }
    }
  </script>

</body>
</html>
