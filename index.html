<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUCVOICE-XMD | PAIRING SITE</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      padding: 20px;
      perspective: 1000px; /* Muhimu kwa 3D Tilt */
    }

    /* Main Card - Ina athari ya kupinda */
    .container {
      max-width: 500px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 30px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
      transition: transform 0.1s ease-out;
      transform-style: preserve-3d;
    }

    /* Logo Section */
    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid white;
      transform: translateZ(50px); /* Inatokeza mbele */
    }

    .logo i {
      font-size: 40px;
      color: white;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 5px;
      transform: translateZ(30px);
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 25px;
      transform: translateZ(20px);
    }

    /* QR Code Display */
    .qr-container {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 20px;
      margin-bottom: 20px;
      display: inline-block;
      border: 2px dashed #4facfe;
      transform: translateZ(40px);
    }

    .qr-container img {
      width: 150px;
      height: 150px;
    }

    /* Input Style */
    .input-box {
      margin-bottom: 20px;
      transform: translateZ(25px);
    }

    input {
      width: 100%;
      padding: 15px;
      border: 2px solid #eee;
      border-radius: 12px;
      outline: none;
      font-size: 1rem;
      text-align: center;
      transition: 0.3s;
    }

    input:focus {
      border-color: #4facfe;
    }

    /* Button Grid */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 15px 0;
      transform: translateZ(35px);
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover { transform: scale(1.05); }

    .btn.pair { background: #4facfe; grid-column: span 2; padding: 15px; font-size: 1rem; }
    .btn.group { background: #25D366; }
    .btn.github { background: #333; }
    .btn.contact { background: #FF6B6B; }
    .btn.channel { background: #764ba2; }

    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #888;
    }

  </style>
</head>
<body>

  <div class="container" id="card">
    
    <div class="logo">
      <i class="fas fa-bolt"></i>
    </div>

    <h1>LUCVOICE-XMD</h1>
    <div class="subtitle">Advanced WhatsApp Utility Bot</div>

    <!-- QR Section -->
    <div class="qr-container">
      <img src="https://qrserver.com" alt="QR Code">
      <p style="font-size: 10px; color: #4facfe; margin-top: 5px; font-weight: bold;">SCAN QR TO PAIR</p>
    </div>

    <!-- Pairing Section -->
    <div class="input-box">
      <input type="text" id="number" placeholder="Enter Phone (+255...)">
    </div>

    <div class="button-grid">
      <button onclick="getPair()" class="btn pair">
        <i class="fas fa-key"></i> GET PAIRING CODE
      </button>

      <button onclick="window.open('https://whatsapp.com')" class="btn group">
        <i class="fab fa-whatsapp"></i> Support
      </button>

      <button onclick="window.open('https://github.com')" class="btn github">
        <i class="fab fa-github"></i> Repo
      </button>

      <button onclick="window.open('https://wa.me/255612619717')" class="btn contact">
        <i class="fas fa-user"></i> Owner
      </button>

      <button onclick="window.open('https://whatsapp.com')" class="btn channel">
        <i class="fas fa-bell"></i> News
      </button>
    </div>

    <div class="footer">
      &copy; 2024 LUCVOICE-XMD • Built with ❤️
    </div>

  </div>

  <script>
    const card = document.getElementById('card');

    // 3D Tilt Logic
    document.addEventListener('mousemove', (e) => {
      let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
      let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // Reset position when mouse leaves
    document.addEventListener('mouseleave', () => {
      card.style.transform = `rotateY(0deg) rotateX(0deg)`;
      card.style.transition = "all 0.5s ease";
    });

    document.addEventListener('mouseenter', () => {
      card.style.transition = "none";
    });

    function getPair() {
      const num = document.getElementById('number').value;
      if(num) {
        alert("Generating code for: " + num);
        // Link logic yako hapa
      } else {
        alert("Please enter a number!");
      }
    }
  </script>

</body>
</html>
