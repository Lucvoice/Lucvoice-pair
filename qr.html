<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD | QR Code</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
radial-gradient(circle at top left,#00ffee55,transparent 30%),
radial-gradient(circle at bottom right,#ff00ea44,transparent 30%),
linear-gradient(135deg,#04050f,#091229,#10193a,#060710);
overflow:hidden;
}

/* glow */
body::before,
body::after{
content:"";
position:absolute;
width:240px;
height:240px;
border-radius:50%;
filter:blur(70px);
opacity:.65;
animation:move 8s infinite alternate ease-in-out;
}

body::before{
background:#00ffee;
top:-80px;
left:-80px;
}

body::after{
background:#ff00cc;
right:-80px;
bottom:-80px;
animation-delay:2s;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(35px,35px);}
}

.container{
width:100%;
max-width:500px;
padding:32px;
border-radius:30px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,.14);
box-shadow:
0 25px 70px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.20);
text-align:center;
color:#fff;
position:relative;
z-index:2;
}

.logo{
width:95px;
height:95px;
margin:auto;
border-radius:26px;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
background:rgba(255,255,255,.13);
border:1px solid rgba(255,255,255,.18);
margin-bottom:18px;
box-shadow:0 0 25px rgba(0,255,255,.20);
}

h1{
font-size:2rem;
font-weight:900;
margin-bottom:8px;
}

h1 span{
background:linear-gradient(90deg,#00ffee,#ffffff,#ff66ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
font-size:.95rem;
color:#e5e5e5;
margin-bottom:24px;
}

/* QR box */
.qr-box{
width:260px;
height:260px;
margin:auto;
border-radius:24px;
padding:15px;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.14);
display:flex;
justify-content:center;
align-items:center;
box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
}

.qr-box img{
width:100%;
height:100%;
border-radius:16px;
background:#fff;
padding:10px;
object-fit:contain;
}

.status{
margin-top:18px;
font-size:.95rem;
color:#00ffee;
font-weight:700;
}

.btns{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:24px;
}

.btn{
padding:14px;
border:none;
border-radius:16px;
font-weight:800;
cursor:pointer;
text-decoration:none;
color:#fff;
transition:.25s;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.12);
}

.btn:hover{
transform:translateY(-4px);
background:rgba(255,255,255,.16);
}

.refresh{
color:#00ffee;
}

.home{
color:#ff77ff;
}

.footer{
margin-top:22px;
padding-top:16px;
border-top:1px solid rgba(255,255,255,.10);
font-size:.85rem;
color:#ddd;
line-height:1.8;
}

.footer span{
color:#00ffee;
font-weight:700;
}

@media(max-width:520px){
.container{
padding:24px;
}
.qr-box{
width:220px;
height:220px;
}
.btns{
grid-template-columns:1fr;
}
h1{
font-size:1.7rem;
}
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<i class="fas fa-qrcode"></i>
</div>

<h1><span>LUCVOICE-XMD</span></h1>
<p class="sub">Scan QR Code To Connect WhatsApp</p>

<div class="qr-box">
<img src="/server-qr-code.png" alt="QR Code">
</div>

<div class="status">
<i class="fas fa-circle-notch fa-spin"></i> Waiting For Scan...
</div>

<div class="btns">

<a href="/qr" class="btn refresh">
<i class="fas fa-rotate"></i> Refresh QR
</a>

<a href="/" class="btn home">
<i class="fas fa-home"></i> Home
</a>

</div>

<div class="footer">
Powered By <span>LUCVOICE-XMD</span><br>
Copyright © 2026
</div>

</div>

</body>
</html>
